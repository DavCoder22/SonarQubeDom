# =============================================================================
# SONARQUBE QA INFRASTRUCTURE - Docker Compose
# Propósito: Levantar entorno de desarrollo local completo
# =============================================================================
version: "3.8"

# =============================================================================
# SERVICIOS: Definimos dos contenedores que trabajan juntos
# =============================================================================
services:
  # ===========================================================================
  # SERVICIO 1: SonarQube Server
  # ===========================================================================
  sonarqube:
    # -------------------------------------------------------------------------
    # BUILD: Construye desde nuestro Dockerfile custom
    # -------------------------------------------------------------------------
    build:
      context: ..                    # Contexto es la raíz del proyecto
      dockerfile: docker/Dockerfile.sonarqube
    
    container_name: sonarqube-server  # Nombre fácil de recordar
    
    # -------------------------------------------------------------------------
    # DEPENDENCIAS: No arrancar hasta que PostgreSQL esté listo
    # -------------------------------------------------------------------------
    depends_on:
      - sonarqube-db
    
    # -------------------------------------------------------------------------
    # VARIABLES DE ENTORNO: Conexión a base de datos
    # -------------------------------------------------------------------------
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_WEB_PORT: 9000
    
    # -------------------------------------------------------------------------
    # PUERTOS: Mapea puerto 9000 del contenedor al 9000 de tu máquina
    # Accede en: http://localhost:9000
    # -------------------------------------------------------------------------
    ports:
      - "9000:9000"
    
    # -------------------------------------------------------------------------
    # VOLÚMENES: Persistir datos entre reinicios del contenedor
    # -------------------------------------------------------------------------
    volumes:
      - sonarqube_data:/opt/sonarqube/data          # Datos de proyectos
      - sonarqube_extensions:/opt/sonarqube/extensions  # Plugins instalados
      - sonarqube_logs:/opt/sonarqube/logs          # Logs de aplicación
    
    # -------------------------------------------------------------------------
    # RED: Comunicación privada entre contenedores
    # -------------------------------------------------------------------------
    networks:
      - sonarqube-network
    
    # -------------------------------------------------------------------------
    # SEGURIDAD: No ejecutar como root (mejor práctica)
    # El usuario sonarqube tiene UID 1000 en la imagen oficial
    # -------------------------------------------------------------------------
    user: "1000:1000"
    
    # -------------------------------------------------------------------------
    # RECURSOS: Límites para no consumir toda tu RAM/CPU
    # -------------------------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: '2'           # Máximo 2 núcleos de CPU
          memory: 2G          # Máximo 2 GB de RAM
        reservations:
          cpus: '1'           # Reserva mínimo 1 núcleo
          memory: 1G          # Reserva mínimo 1 GB

  # ===========================================================================
  # SERVICIO 2: PostgreSQL (Base de datos de SonarQube)
  # ===========================================================================
  sonarqube-db:
    image: postgres:15-alpine         # Imagen ligera de PostgreSQL
    container_name: sonarqube-postgres
    
    environment:
      POSTGRES_USER: sonar             # Usuario de la base de datos
      POSTGRES_PASSWORD: sonar         # Password (CAMBIAR EN PRODUCCIÓN)
      POSTGRES_DB: sonarqube           # Nombre de la base de datos
    
    volumes:
      - postgresql_data:/var/lib/postgresql/data  # Persistir datos
    
    networks:
      - sonarqube-network
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

# =============================================================================
# VOLÚMENES: Almacenamiento persistente gestionado por Docker
# =============================================================================
volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql_data:

# =============================================================================
# REDES: Red privada tipo bridge para aislamiento
# =============================================================================
networks:
  sonarqube-network:
    driver: bridge