# =============================================================================
# SONARQUBE QA INFRASTRUCTURE - Docker Compose
# Propósito: Levantar entorno de desarrollo local completo
# NOTA: Usa base de datos H2 embebida (para desarrollo/pruebas)
# =============================================================================
version: "3.8"

# =============================================================================
# SERVICIOS: SonarQube con H2 embebida (sin PostgreSQL)
# =============================================================================
services:
  # ===========================================================================
  # SERVICIO: SonarQube Server (con H2 embebida)
  # ===========================================================================
  sonarqube:
    # -------------------------------------------------------------------------
    # IMAGE: Usamos la imagen oficial directamente
    # -------------------------------------------------------------------------
    image: sonarqube:community
    
    container_name: sonarqube-server
    
    # -------------------------------------------------------------------------
    # VARIABLES DE ENTORNO: Sin PostgreSQL, usa H2 por defecto
    # -------------------------------------------------------------------------
    environment:
      SONAR_WEB_PORT: 9000
      # DESCOMENTAR SI USAS POSTGRESQL:
      # SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      # SONAR_JDBC_USERNAME: sonar
      # SONAR_JDBC_PASSWORD: sonar
    
    # -------------------------------------------------------------------------
    # PUERTOS: Mapea puerto 9000 del contenedor al 9000 de tu máquina
    # Accede en: http://localhost:9000
    # -------------------------------------------------------------------------
    ports:
      - "9000:9000"
    
    # -------------------------------------------------------------------------
    # VOLÚMENES: Persistir datos entre reinicios del contenedor
    # -------------------------------------------------------------------------
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    
    # -------------------------------------------------------------------------
    # RED: Comunicación privada entre contenedores
    # -------------------------------------------------------------------------
    networks:
      - sonarqube-network
    
    # -------------------------------------------------------------------------
    # SEGURIDAD: No ejecutar como root
    # -------------------------------------------------------------------------
    user: "1000:1000"
    
    # -------------------------------------------------------------------------
    # RECURSOS: Límites para no consumir toda tu RAM/CPU
    # -------------------------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ===========================================================================
  # POSTGRESQL (COMENTADO - opcional, solo para producción)
  # Descomenta si necesitas PostgreSQL en lugar de H2
  # ===========================================================================
  # sonarqube-db:
  #   image: postgres:15-alpine
  #   container_name: sonarqube-postgres
  #   
  #   environment:
  #     POSTGRES_USER: sonar
  #     POSTGRES_PASSWORD: sonar
  #     POSTGRES_DB: sonarqube
  #   
  #   volumes:
  #     - postgresql_data:/var/lib/postgresql/data
  #   
  #   networks:
  #     - sonarqube-network

# =============================================================================
# VOLÚMENES: Almacenamiento persistente gestionado por Docker
# =============================================================================
volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  # postgresql_data:  # Descomenta si usas PostgreSQL

# =============================================================================
# REDES: Red privada tipo bridge para aislamiento
# =============================================================================
networks:
  sonarqube-network:
    driver: bridge